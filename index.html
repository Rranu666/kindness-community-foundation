<!doctype html>

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@KCFKindness" />
    <meta name="twitter:title" content="Kindness Community Foundation | Volunteer Networks &amp; Social Impact" />
    <meta name="twitter:description" content="KCF is a California nonprofit building ethical volunteer networks and sustainable community infrastructure. Join KindWave and serve your community today." />
    <meta name="twitter:image" content="https://kindnesscommunityfoundation.com/og-image.png" />

  <body>
    <!-- Netlify Forms detection — hidden, not rendered -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>

      <input name="name" />
      <input name="email" />
      <input name="subject" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
